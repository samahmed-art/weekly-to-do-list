<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="dashboard.css" />
    <link rel="stylesheet" href="global.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>Document</title>
  </head>

  <body>
    <div style="margin-bottom: 70px">
 <a  href="archive.html" class="archive-nav-btn" style="position: absolute; top: 20px; left: 20px; background: #2c3e50; color: white; padding: 10px 15px; border-radius: 8px; text-decoration: none; font-weight: bold; display: flex; align-items: center; gap: 5px;">
    📁 عرض الأرشيف
</a>    </div>
    <div style="text-align: center; margin: 20px auto 10px auto; max-width: 1000px; font-family: sans-serif;">
    <h3 style="color: #2c3e50; font-size: 1.1rem; background-color: #f0f4f8; padding: 10px; border-radius: 6px; display: inline-block;">
        📅 فترة الجدول الحالي: <span id="week-range" style="color: #5591AE; font-weight: bold;">جاري الحساب...</span>
    </h3>
</div>
    <div class="table-container">
      <table dir="rtl">
        <thead>
          <tr>
            <th class="diagonal-split">
<span class="top-right">tasks</span> 
<span class="bottom-left">days</span>   

     </th>

          </tr>
        </thead>
        <tbody>
          
        </tbody>
      </table>
    </div>

    <div id="myModal" class="modal" style="display: none; ">
  <div class="modal-content">
    <span class="close" onclick="closePop()">&times;</span>
    <h2>📊 تقييمك النهائي لهذا الأسبوع</h2>
    <p>نسبة إنجازك الافتراضية: <strong id="score-result">0%</strong></p>
    
    <hr>

    <div class="rating-section">
      <p>قيم أداءك بنفسك هذا الأسبوع:</p>
      <div class="stars-container">
        <input type="radio" id="star5" name="user-rating" value="5"><label for="star5" title="ممتاز">★</label>
        <input type="radio" id="star4" name="user-rating" value="4"><label for="star4" title="جيد جداً">★</label>
        <input type="radio" id="star3" name="user-rating" value="3"><label for="star3" title="متوسط">★</label>
        <input type="radio" id="star2" name="user-rating" value="2"><label for="star2" title="مقبول">★</label>
        <input type="radio" id="star1" name="user-rating" value="1"><label for="star1" title="ضعيف">★</label>
      </div>
    </div>

    <div class="notes-section">
      <label for="week-notes">اكتب ملاحظاتك وخلاصة أسبوعك هنا:</label>
      <textarea id="week-notes" rows="4" placeholder="كيف كان أسبوعك؟ ما هي العقبات أو الإنجازات المحققة..."></textarea>
    </div>

    <button id="save-review-btn">حفظ تقييم الأسبوع</button>
  </div>
</div>
<br>
<br>
<br>
<div class="dashboard-chart-wrapper" style="width: 100%; max-width: 750px; margin: 30px auto; padding: 20px; direction: rtl;">    


    <div style="position: relative; width: 100%; height: 300px;">
        <canvas id="weeklyProgressChart"></canvas>
    </div>
</div>
<div style="text-align: left; margin-bottom: 15px; max-width: 1000px; margin: 0 auto 15px auto;">
    <button id="add-mid-week-task-btn" style="background-color: #5591AE; color: white; padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">
        ➕ إضافة مهمة جديدة الآن
    </button>
</div>  </body>
                  <script src="main.js" defer></script>

</html>
